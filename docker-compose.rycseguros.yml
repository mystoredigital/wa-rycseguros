# Instancia DEDICADA y aislada para el cliente Ramirez y Cañavera Seguros.
# Mismo código que docker-compose.yml pero con nombres/volúmenes/host propios.
# - Volúmenes ../files/* -> aislados por compose en Dokploy (datos privados del cliente).
# - Sin sidecar Whisper (transcripción de voz IA opcional; no necesaria para el caso Odoo).
# - Sin GHL (tenant local). Reusa la config de R2 vía variables de entorno del compose.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wa-rycseguros:latest
    container_name: wa-rycseguros
    restart: unless-stopped
    networks:
      - dokploy-network
    volumes:
      - ../files/data:/app/data
      - ../files/credentials:/app/credentials
    environment:
      PORT: ${PORT}
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASS: ${DASHBOARD_PASS}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME}
      TIMEZONE: ${TIMEZONE}
      BUSINESS_NAME: ${BUSINESS_NAME}
      BUSINESS_DESCRIPTION: ${BUSINESS_DESCRIPTION}
      HUMAN_DELAY_MIN_MS: ${HUMAN_DELAY_MIN_MS}
      HUMAN_DELAY_MAX_MS: ${HUMAN_DELAY_MAX_MS}
      PER_CHAT_COOLDOWN_MS: ${PER_CHAT_COOLDOWN_MS}
      GLOBAL_MAX_PER_MIN: ${GLOBAL_MAX_PER_MIN}
      QUIET_HOURS_START: ${QUIET_HOURS_START}
      QUIET_HOURS_END: ${QUIET_HOURS_END}
      NEW_CONTACT_REQUIRES_HUMAN: ${NEW_CONTACT_REQUIRES_HUMAN}
      # R2 media storage (reusa la config de la instancia actual)
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    labels:
      - traefik.enable=true
      - traefik.http.routers.wa-rycseguros.entrypoints=websecure
      - traefik.http.routers.wa-rycseguros.rule=Host(`wa-rycseguros.mystoredigital.cloud`)
      - traefik.http.routers.wa-rycseguros.tls.certresolver=letsencrypt
      - traefik.http.services.wa-rycseguros.loadbalancer.server.port=3000

networks:
  dokploy-network:
    external: true
