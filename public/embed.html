<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WhatsApp Agent · embed</title>
<style>
body{margin:0;background:#0f1419;color:#e7e9ea;font-family:-apple-system,system-ui,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
.box{text-align:center;max-width:420px;padding:32px}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #1d9bf0;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#f44336;margin-top:12px;font-size:13px;font-family:ui-monospace,monospace}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <div id="status">Autenticando con GHL…</div>
  <div class="err" id="err"></div>
</div>
<script>
const $status = document.getElementById('status');
const $err = document.getElementById('err');

function fail(msg) {
  document.querySelector('.spinner').style.display = 'none';
  $status.textContent = 'Error de SSO';
  $err.textContent = msg;
}

let received = false;
const timeout = setTimeout(() => {
  if (!received) fail('GHL no respondió con USER_DATA. ¿Estás accediendo desde dentro de GHL como iframe?');
}, 10000);

window.addEventListener('message', async (event) => {
  if (!event.data) return;
  const payload = event.data.payload || event.data.encryptedData || (typeof event.data === 'string' ? event.data : null);
  if (!payload) return;
  received = true;
  clearTimeout(timeout);
  $status.textContent = 'Descifrando…';
  try {
    const res = await fetch('/api/embed/sso', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ encryptedData: payload }),
    });
    const data = await res.json();
    if (!res.ok || !data.locationId) {
      return fail(data.error || `HTTP ${res.status}`);
    }
    $status.textContent = `Conectado a ${data.locationId.slice(0, 8)}… cargando dashboard…`;
    location.href = `/?tenant=${encodeURIComponent(data.locationId)}&embed=1`;
  } catch (e) {
    fail(e.message);
  }
});

// Solicita los datos del usuario al parent (GHL)
window.parent.postMessage({ message: 'REQ_USER_DATA' }, '*');
</script>
</body>
</html>
